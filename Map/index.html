<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gingilla Farm | Task Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Assistant', sans-serif;
            background-color: #3e2723;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .main-board {
            width: 100%;
            max-width: 1100px;
            /* עדכון לשם הקובץ החדש */
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('map_pic.png');
            background-size: cover;
            background-position: center;
            border: 12px solid #5d4037;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            padding: 30px;
            position: relative;
        }

        .board-header {
            text-align: center;
            background: white;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 40px;
            border-bottom: 5px solid #f97316;
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            justify-items: center;
        }

        .task-note {
            background: #fff9c4;
            width: 200px;
            height: 210px;
            padding: 20px;
            position: relative;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
            text-decoration: none;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .task-note:hover {
            transform: translateY(-5px);
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
        }

        .pin {
            width: 14px; height: 14px;
            border-radius: 50%;
            position: absolute;
            top: 10px; left: 50%;
            transform: translateX(-50%);
            border: 1px solid rgba(0,0,0,0.3);
        }

        .note-icon { font-size: 3.5rem; }
        .note-text { font-weight: 800; color: #3e2723; font-size: 1.1rem; text-align: center; line-height: 1.2; }
        .note-port { font-size: 0.7rem; color: #8d6e63; font-weight: 800; background: rgba(0,0,0,0.05); padding: 2px 6px; border-radius: 4px; }

        .status-light {
            width: 10px; height: 10px;
            background: #22c55e;
            border-radius: 50%;
            position: absolute;
            top: 10px; right: 10px;
        }
    </style>
</head>
<body>

    <div class="main-board">
        
        <div class="board-header">
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">GINGILLA FARM</h1>
            <p class="text-xs text-slate-500 font-bold uppercase tracking-widest">System Overview & Management</p>
        </div>

        <div class="notes-grid">
            
            <a href="http://shon-comp:3100" target="_blank" class="task-note">
                <div class="pin" style="background: #4caf50;"></div>
                <div class="status-light"></div>
                <span class="note-icon">🎓</span>
                <span class="note-text" data-en="Limodim" data-he="מרכז הלמידה">מרכז הלמידה</span>
                <span class="note-port">PORT: 3100</span>
            </a>

            <a href="http://shon-comp:8400" target="_blank" class="task-note">
                <div class="pin" style="background: #e91e63;"></div>
                <div class="status-light"></div>
                <span class="note-icon">🥋</span>
                <span class="note-text" data-en="Trainees" data-he="מתאמנים">מתאמנים</span>
                <span class="note-port">PORT: 8400</span>
            </a>

            <a href="http://shon-comp:8096" target="_blank" class="task-note">
                <div class="pin" style="background: #ffeb3b;"></div>
                <div class="status-light"></div>
                <span class="note-icon">🍿</span>
                <span class="note-text" data-en="Cinema" data-he="קולנוע החווה">קולנוע החווה</span>
                <span class="note-port">PORT: 8096</span>
            </a>

            <a href="http://shon-comp:8300" target="_blank" class="task-note">
                <div class="pin" style="background: #ff9800;"></div>
                <div class="status-light"></div>
                <span class="note-icon">🎨</span>
                <span class="note-text" data-en="Project Icons" data-he="אייקונים לפרויקט">אייקונים לפרויקט</span>
                <span class="note-port">PORT: 8300</span>
            </a>

            <a href="http://shon-comp:8301/docs" target="_blank" class="task-note">
                <div class="pin" style="background: #00bcd4;"></div>
                <div class="status-light"></div>
                <span class="note-icon">🖼️</span>
                <span class="note-text" data-en="Icons Server" data-he="שרת אייקונים">שרת אייקונים</span>
                <span class="note-port">PORT: 8301</span>
            </a>

            <a href="http://shon-comp:8000/docs" target="_blank" class="task-note">
                <div class="pin" style="background: #f44336;"></div>
                <div class="status-light"></div>
                <span class="note-icon">🗄️</span>
                <span class="note-text" data-en="DB Manager" data-he="מסד נתונים">מסד נתונים</span>
                <span class="note-port">PORT: 8000</span>
            </a>

            <a href="http://shon-comp:8401/docs" target="_blank" class="task-note">
                <div class="pin" style="background: #3f51b5;"></div>
                <div class="status-light"></div>
                <span class="note-icon">⚔️</span>
                <span class="note-text" data-en="Trainees Server" data-he="מתאמנים שרת">מתאמנים שרת</span>
                <span class="note-port">PORT: 8401</span>
            </a>

        </div>

        <button onclick="toggleLanguage()" class="mt-10 bg-white/90 px-4 py-2 rounded font-bold text-xs shadow-md hover:bg-white transition-all">HE / EN</button>
    </div>

    <script>
        function toggleLanguage() {
            const isEn = document.documentElement.getAttribute('lang') === 'en';
            document.documentElement.setAttribute('lang', isEn ? 'he' : 'en');
            document.documentElement.setAttribute('dir', isEn ? 'rtl' : 'ltr');

            document.querySelectorAll('[data-en]').forEach(el => {
                el.textContent = isEn ? el.getAttribute('data-he') : el.getAttribute('data-en');
            });
        }
    </script>
</body>
</html>
