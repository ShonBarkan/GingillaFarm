services:
  # --- DATABASE ---
  db:
    image: postgres:16-alpine
    container_name: GingillaFarm-postgres-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${EXTERNAL_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- MICROSERVERS ---
  db_manager:
    build:
      context: ./buildings/microservers/db_manager
    container_name: db_manager
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db

  ai_service:
    build:
      context: ./buildings/microservers/ai_service
    container_name: ai_service
    restart: always
    ports:
      - "${AI_PORT_EXTERNAL}:8002"
    depends_on:
      - db

  # --- LIMODIM ---
  limodim-backend:
    build:
      context: ./buildings/Limodim/server
    container_name: limodim_backend
    restart: always
    ports:
      - "${BACKEND_PORT}:8002"
    environment:
      - DB_MANAGER_URL=${DB_MANAGER_URL}
      - DB_NAME=${DB_NAME}
      - PDF_STORAGE_PATH=${INTERNAL_PDF_STORAGE_PATH}
    env_file: .env
    volumes:
      - ./buildings/Limodim/server:/app
      - ${HOST_PDF_STORAGE_PATH}:${INTERNAL_PDF_STORAGE_PATH}
    depends_on:
      - db
      - db_manager

  limodim-frontend:
    build:
      context: ./buildings/Limodim/client
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: limodim_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT}:3100"
    depends_on:
      - limodim-backend

  # --- MAP VIEWER ---
  farm-map:
    image: nginx:stable-alpine
    container_name: gingilla_map
    ports:
      - "${MAP_PORT}:80"
    volumes:
      - ./Map:/usr/share/nginx/html:ro
    restart: always

  # --- MESSENGER ---
  messenger:
    build:
      context: ./messenger
    container_name: gingilla_messenger
    restart: always
    ports:
      - "${MESSENGER_PORT}:8020"
    environment:
      - MESSENGER_API_BASE=${MESSENGER_API_BASE}
      - TZ=Asia/Jerusalem
      - PYTHONUNBUFFERED=1
    env_file: .env
    volumes:
      - ./messenger/data:/root/.mudslide
      - ./messenger:/app

volumes:
  postgres_data: